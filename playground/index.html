<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Extension — extension-sdk playground</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <section class="panel">
      <h1>Extension SDK Playground</h1>

      <div class="controls">
        <button id="refresh-token" type="button" disabled>
          Request token refresh
        </button>
      </div>

      <div class="columns">
        <details class="column" open>
          <summary>Events</summary>
          <ol id="extension-log" class="log"></ol>
        </details>

        <details class="column" open>
          <summary>Payload</summary>
          <pre id="extension-state" class="status">Connecting…</pre>
        </details>
      </div>
    </section>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
