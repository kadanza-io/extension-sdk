<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parent simulator — extension-sdk playground</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="layout">
      <section class="panel">
        <h1>Parent simulator</h1>
        <p>
          Embeds the extension iframe and responds to
          <code>postMessage</code> protocol events.
        </p>

        <div class="controls">
          <button id="load-settings" type="button" disabled>
            Send LOAD_PAGE_SETTINGS
          </button>
          <button id="reload-iframe" type="button">Reload iframe</button>
        </div>

        <h2>State</h2>
        <pre id="parent-state" class="status">Waiting for iframe…</pre>

        <h2>Event log</h2>
        <pre id="parent-log" class="log"></pre>
      </section>

      <section class="panel">
        <h2>Extension iframe</h2>
        <div class="iframe-shell">
          <iframe id="extension-frame" title="Extension"></iframe>
        </div>
      </section>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
